name: automation issues bot
on:
  schedule:
    - cron: '10 1 * * sun'
  workflow_dispatch:  # ✅ Permite ejecución manual

jobs:
  send-issues:
    runs-on: ubuntu-latest
    steps:
        - name: Send issues bot
          run: |
            python3 - <<'EOF'
            import requests
            import json

            # Obtenemos las issues del repositorio
            repo = "YerssonDavid/Finavex"
            issues = requests.get(f"https://api.github.com/repos/{repo}/issues").json()

            message = "**Issues pendientes**\n\n"
            for issue in issues[:10]:
                message += f"- [{issue['title']}]({issue['html_url']})\n"

            token = "${{ secrets.BOT_DISCORD }}"
            user_id = "${{ secrets.DISCORD_USER_ID }}"

            headers = {"Authorization": f"Bot {token}"}
            url = f"https://discord.com/api/v10/users/{user_id}/channels"

            dm = requests.post(url, headers=headers, json={"recipient_id": user_id}).json()
            channel_id = dm['id']

            requests.post(
                f"https://discord.com/api/v10/channels/{channel_id}/messages",
                headers=headers,
                json={"content": message}
            )
            EOF
