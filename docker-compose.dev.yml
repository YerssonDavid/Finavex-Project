version: '3.8'

services:
  finavex-frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: finavex-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    command: bun run dev

